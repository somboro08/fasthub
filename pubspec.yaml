name: fasthub
description: Application LaTeX pour étudiants
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.1
  connectivity_plus: ^7.0.0
  sqflite: ^2.3.0
  path: ^1.8.3
  uuid: ^4.1.0
  supabase_flutter: ^2.2.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  intl: ^0.20.2
  font_awesome_flutter: ^10.6.0
  flutter_widget_from_html_core: ^0.17.0
  url_launcher: ^6.2.2
  http: ^1.1.0
  syncfusion_flutter_pdfviewer: ^32.2.3
  webview_flutter: ^4.7.0
  file_picker: ^10.3.10
  path_provider: ^2.1.5
  flutter_highlight: ^0.7.0
  image_picker: ^1.0.4
  shared_preferences: ^2.5.4
 
  google_generative_ai: ^0.4.0
  flutter_markdown: ^0.7.4
  flutter_math_fork: ^0.7.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - lib/
flutter_launcher_icons:
        android: "launcher_icon"
        ios: true
        image_path: "assets/images/fasthublogo.jpg" 
        min_sdk_android: 21
 